on:
  push:
    branches: [main]
  workflow_dispatch:

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      # Uncomment if your slides contain R code:
      # - name: Install R
      #   uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: '4.5.1'
      #     use-public-rspm: true
      # - name: Install R dependencies
      #   run: |
      #     install.packages(c("sf", "tidyverse", "targets"))

      # Uncomment if your slides contain Python code:
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.13'
      # - name: Install Python dependencies
      #   run: pip install pandas geopandas

      - name: Render site
        run: quarto render --no-execute

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4