on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

name: PR Preview

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect project requirements
        if: github.event.action != 'closed'
        id: detect
        run: |
          NEED_R=false
          NEED_PYTHON=false
          FORMATS=""
          ENGINES=""

          shopt -s globstar 2>/dev/null || true

          for f in *.qmd **/*.qmd; do
            [ -f "$f" ] || continue
            F=$(quarto inspect "$f" 2>/dev/null | jq -r '.formats // empty | keys[]' 2>/dev/null)
            FORMATS="$FORMATS $F"
            E=$(quarto inspect "$f" 2>/dev/null | jq -r '.engines // empty | .[]' 2>/dev/null)
            ENGINES="$ENGINES $E"
          done

          echo "Formats found: $FORMATS"
          echo "Engines found: $ENGINES"

          if echo "$ENGINES" | grep -qF "knitr"; then
            NEED_R=true
          fi
          if echo "$ENGINES" | grep -qF "jupyter"; then
            NEED_PYTHON=true
          elif echo "$ENGINES" | grep -qF "markdown"; then
            NEED_PYTHON=false
          fi

          echo "need_r=$NEED_R" >> "$GITHUB_OUTPUT"
          echo "need_python=$NEED_PYTHON" >> "$GITHUB_OUTPUT"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        if: github.event.action != 'closed' && steps.detect.outputs.need_r == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Install R dependencies
        if: github.event.action != 'closed' && steps.detect.outputs.need_r == 'true'
        run: |
          if [ -f renv.lock ]; then
            Rscript -e 'renv::restore()'
          else
            Rscript -e 'install.packages(c("sf", "tidyverse"), repos = "https://cran.rstudio.com/")'
          fi

      - name: Set up Python
        if: github.event.action != 'closed' && steps.detect.outputs.need_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        if: github.event.action != 'closed' && steps.detect.outputs.need_python == 'true'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install pandas geopandas

      - name: Render site
        run: |
          if [ "${{ github.event.action }}" != "closed" ]; then
            quarto render
          else
            mkdir -p docs
          fi

      - name: Deploy preview to Pages
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview